name: "Downstream Impact Guardian"
description: >
  On every dbt PR: detects breaking schema/logic/semantic changes, assesses
  real cross-system blast radius via DataHub lineage, proposes a Data
  Contract back into DataHub, and posts a PR comment with mergeable
  compatibility code. Runs entirely on the Action runner — no hosting.
author: junwei-lai
branding:
  icon: shield
  color: green

inputs:
  dbt-project-dir:
    description: Path to the dbt project in your repo
    required: true
  prod-manifest:
    description: >
      Last-known-production manifest.json. Default:
      <dbt-project-dir>/prod_state/manifest.json
    default: ""
  glossary-file:
    description: >
      DataHub business glossary yml tracked in your repo. Default:
      <dbt-project-dir>/datahub/business_glossary.yml
    default: ""
  pr-number:
    description: Pull request number
    default: ${{ github.event.pull_request.number }}
  datahub-url:
    description: DataHub GMS URL. Empty = offline fixture mode.
    default: ""
  datahub-token:
    description: DataHub access token (required if GMS auth is enabled)
    default: ""
  google-api-key:
    description: Gemini API key for the ADK narrative agent (optional)
    default: ""
  github-token:
    description: Token used to post the PR comment
    default: ${{ github.token }}
  dbt-adapter:
    description: dbt adapter package to install
    default: dbt-bigquery
  datahub-platform:
    description: Warehouse platform in your DataHub urns
    default: bigquery
  warehouse-project:
    description: Warehouse project/database in your DataHub urns (GCP_PROJECT)
    default: ""
  warehouse-dataset:
    description: Warehouse dataset/schema in your DataHub urns (BQ_DATASET)
    default: ""
  output-dir:
    description: Where generated artifacts are written
    default: .dig_output
  strict:
    description: Fail the check on HIGH/CRITICAL severity ("true"/"false")
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

    - name: Install guardian
      shell: bash
      env:
        DATAHUB_GMS_URL: ${{ inputs.datahub-url }}
      run: |
        pip install -q -r "${{ github.action_path }}/agent/requirements.txt" "${{ inputs.dbt-adapter }}"
        if [ -n "$DATAHUB_GMS_URL" ]; then
          pip install -q -r "${{ github.action_path }}/agent/requirements-live.txt"
        fi

    # `dbt parse` opens no warehouse connection; the consuming repo needs a
    # parse-able profiles.yml in the dbt project dir (env-driven is fine).
    # Inputs reach the shell ONLY via env indirection (never interpolated
    # into run: — injection surface), and empty inputs must NOT be
    # exported: an empty env var defeats env_var() defaults in profiles.yml
    # ("Must specify schema").
    - name: Parse PR dbt state
      shell: bash
      working-directory: ${{ inputs.dbt-project-dir }}
      env:
        DBT_PROFILES_DIR: "."
        INPUT_WAREHOUSE_PROJECT: ${{ inputs.warehouse-project }}
        INPUT_WAREHOUSE_DATASET: ${{ inputs.warehouse-dataset }}
      run: |
        if [ -n "$INPUT_WAREHOUSE_PROJECT" ]; then
          export GCP_PROJECT="$INPUT_WAREHOUSE_PROJECT"
        fi
        if [ -n "$INPUT_WAREHOUSE_DATASET" ]; then
          export BQ_DATASET="$INPUT_WAREHOUSE_DATASET"
        fi
        dbt parse --no-partial-parse

    - name: Run Downstream Impact Guardian
      shell: bash
      env:
        DATAHUB_GMS_URL: ${{ inputs.datahub-url }}
        DATAHUB_GMS_TOKEN: ${{ inputs.datahub-token }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DATAHUB_PLATFORM: ${{ inputs.datahub-platform }}
        INPUT_WAREHOUSE_PROJECT: ${{ inputs.warehouse-project }}
        INPUT_WAREHOUSE_DATASET: ${{ inputs.warehouse-dataset }}
        INPUT_DBT_PROJECT_DIR: ${{ inputs.dbt-project-dir }}
        INPUT_PROD_MANIFEST: ${{ inputs.prod-manifest }}
        INPUT_GLOSSARY_FILE: ${{ inputs.glossary-file }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_STRICT: ${{ inputs.strict }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        if [ -n "$INPUT_WAREHOUSE_PROJECT" ]; then
          export GCP_PROJECT="$INPUT_WAREHOUSE_PROJECT"
        fi
        if [ -n "$INPUT_WAREHOUSE_DATASET" ]; then
          export BQ_DATASET="$INPUT_WAREHOUSE_DATASET"
        fi
        PROD="${INPUT_PROD_MANIFEST:-$INPUT_DBT_PROJECT_DIR/prod_state/manifest.json}"
        GLOSS="${INPUT_GLOSSARY_FILE:-$INPUT_DBT_PROJECT_DIR/datahub/business_glossary.yml}"
        STRICT_ARGS=()
        if [ "$INPUT_STRICT" = "true" ]; then
          STRICT_ARGS=("--strict")
        fi
        python "$ACTION_PATH/agent/main.py" \
          --pr-number "$INPUT_PR_NUMBER" \
          --prod-manifest "$PROD" \
          --pr-manifest "$INPUT_DBT_PROJECT_DIR/target/manifest.json" \
          --glossary "$GLOSS" \
          --output-dir "$INPUT_OUTPUT_DIR" \
          "${STRICT_ARGS[@]}"
