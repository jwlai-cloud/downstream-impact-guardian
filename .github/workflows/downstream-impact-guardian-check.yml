name: downstream-impact-guardian

# Core loop trigger (docs/SPEC.md §7). This repo dogfoods its own composite
# action (./action.yml) — the same `uses:` block works from ANY dbt repo as
# junwei-lai/downstream-impact-guardian@v1. Judge path: open a PR from the
# pre-made demo/* branch to master IN THIS REPO (no fork needed); fork PRs
# get no secrets and degrade to offline fixture mode (ADR-0007).
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "dbt_demo_project/**"

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post/update the guardian comment
    steps:
      - uses: actions/checkout@v4

      - name: Downstream Impact Guardian
        uses: ./
        with:
          dbt-project-dir: dbt_demo_project
          datahub-url: ${{ secrets.DATAHUB_GMS_URL }}
          datahub-token: ${{ secrets.DATAHUB_GMS_TOKEN }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          warehouse-project: ${{ vars.GCP_PROJECT }}
          warehouse-dataset: ${{ vars.BQ_DATASET }}

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardian-output
          path: .dig_output/
          if-no-files-found: ignore
